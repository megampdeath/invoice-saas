# Render blueprint — FREE TIER ONLY (no worker, no Redis).
#
# Why no worker/Redis: Render's Background Workers and managed Redis are paid
# resources. The API has an inline fallback: when REDIS_URL is empty, extraction
# and export jobs run synchronously inside the API process. This keeps the whole
# stack at $0, at the cost of no true background processing (fine for testing /
# low volume).
#
# Free-tier caveats: services spin down after 15 min of inactivity (cold start
# ~30s). Upgrade to paid plans later for production traffic.
#
# Upgrade path (when you want true async, ~$7/mo): add the commented-out Redis +
# worker blocks at the bottom, set REDIS_URL on the API, and switch
# EXTRACTION_PROVIDER to "textract".
#
# Secrets are set per-service via the deploy script (read from local .env).

services:
  - type: web
    name: invoice-saas-api
    region: ohio
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: EXTRACTION_PROVIDER
        value: mock
      - key: STORAGE_BACKEND
        value: supabase
      - key: REDIS_URL
        value: ""                       # empty -> inline fallback (no Redis)
      - key: SUPABASE_STORAGE_ORIGINALS_BUCKET
        value: invoice-originals
      - key: SUPABASE_STORAGE_EXPORTS_BUCKET
        value: invoice-exports
      - key: SUPABASE_STORAGE_OCR_RAW_BUCKET
        value: ocr-raw-results
      - key: WEB_CONCURRENCY
        value: 1
      # Backend secrets (SUPABASE_*, DATABASE_URL, AWS_*, PREVIEW_TOKEN_SECRET)
      # are injected by the deploy script as individual env vars.

  - type: web
    name: invoice-saas-web
    region: ohio
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    autoDeploy: true
    envVars:
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: NEXT_PUBLIC_BACKEND_BASE_URL
        value: https://invoice-saas-api.onrender.com   # confirmed after first deploy
      - key: BACKEND_BASE_URL
        value: https://invoice-saas-api.onrender.com
      - key: NODE_ENV
        value: production

